<!DOCTYPE html>
<html>
<head>
    <title>Microphone Access Setup</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f8f9fa; 
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #333; }
        p { color: #666; margin-bottom: 24px; line-height: 1.5; }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        #status { margin-top: 16px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Microphone Access Required</h2>
        <p>Bropilot needs microphone permission to run voice recognition. Please click below to allow access.</p>
        <button id="requestBtn">Grant Microphone Access</button>
        <p id="status"></p>
    </div>
    <script src="options.js"></script>
</body>
</html>
